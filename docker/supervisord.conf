[supervisord]
nodaemon=true
user=root
logfile=/var/log/supervisor/supervisord.log
pidfile=/var/run/supervisord.pid

; ─── Nginx ───────────────────────────────────────────────────────────────────
[program:nginx]
command=nginx -g "daemon off;"
autostart=true
autorestart=true
priority=1
stdout_logfile=/dev/stdout
stdout_logfile_maxbytes=0
stderr_logfile=/dev/stderr
stderr_logfile_maxbytes=0

; ─── PHP-FPM ─────────────────────────────────────────────────────────────────
[program:php-fpm]
command=php-fpm -F
autostart=true
autorestart=true
priority=2
stdout_logfile=/dev/stdout
stdout_logfile_maxbytes=0
stderr_logfile=/dev/stderr
stderr_logfile_maxbytes=0

; ─── Scheduler (reemplaza al crontab del sistema) ────────────────────────────
[program:scheduler]
command=php /var/www/html/artisan schedule:work
directory=/var/www/html
autostart=true
autorestart=true
user=www-data
numprocs=1
stdout_logfile=/var/log/supervisor/scheduler.log
stdout_logfile_maxbytes=10MB
stdout_logfile_backups=3
stderr_logfile=/dev/stderr
stderr_logfile_maxbytes=0

; ─── Worker: cortes y reactivaciones (alta prioridad) ────────────────────────
[program:worker-suspensions]
command=php /var/www/html/artisan queue:work database
    --queue=suspensions,reactivations
    --tries=3
    --backoff=300
    --timeout=120
    --sleep=10
    --max-jobs=50
    --max-time=3600
directory=/var/www/html
autostart=true
autorestart=true
user=www-data
numprocs=1
stdout_logfile=/var/log/supervisor/worker-suspensions.log
stdout_logfile_maxbytes=10MB
stdout_logfile_backups=3
stderr_logfile=/dev/stderr
stderr_logfile_maxbytes=0

; ─── Worker: facturación y sync MikroTik (cola general) ─────────────────────
[program:worker-default]
command=php /var/www/html/artisan queue:work database
    --queue=default
    --tries=3
    --backoff=60
    --timeout=300
    --sleep=15
    --max-jobs=100
    --max-time=3600
directory=/var/www/html
autostart=true
autorestart=true
user=www-data
numprocs=1
stdout_logfile=/var/log/supervisor/worker-default.log
stdout_logfile_maxbytes=10MB
stdout_logfile_backups=3
stderr_logfile=/dev/stderr
stderr_logfile_maxbytes=0
