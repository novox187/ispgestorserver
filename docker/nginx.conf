user www-data;
worker_processes auto;
pid /run/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    sendfile        on;
    keepalive_timeout 65;
    client_max_body_size 20M;

    gzip on;
    gzip_types text/plain application/json application/javascript text/css;

    # Mapa de orígenes CORS permitidos — vacío para orígenes no autorizados
    map $http_origin $cors_origin {
        default                         '';
        ~^https://(ironlink\.uk|admin\.ironlink\.uk)$  $http_origin;
    }

    server {
        listen 80;
        server_name _;
        root /var/www/html/public;
        index index.php;

        # Logs al stdout/stderr para que Coolify los capture
        access_log /dev/stdout;
        error_log  /dev/stderr warn;

        # Solo errores que genera nginx mismo (PHP-FPM caído, timeout de upstream)
        # NO incluye el 500 de PHP — ese pasa directo con CORS via add_header always
        error_page 502 503 504 @nginx_error;
        location @nginx_error {
            default_type application/json;
            add_header 'Access-Control-Allow-Origin'      $cors_origin always;
            add_header 'Access-Control-Allow-Credentials' 'true'       always;
            return 500 '{"success":false,"message":"Error interno del servidor. Intente nuevamente."}';
        }

        # WebSocket proxy → Reverb (Laravel Broadcasting)
        location /app/ {
            proxy_pass         http://127.0.0.1:8080;
            proxy_http_version 1.1;
            proxy_set_header   Upgrade $http_upgrade;
            proxy_set_header   Connection "Upgrade";
            proxy_set_header   Host $host;
            proxy_read_timeout 60s;
            proxy_send_timeout 60s;
        }

        location / {
            try_files $uri $uri/ /index.php?$query_string;
        }

        location ~ \.php$ {
            fastcgi_pass              127.0.0.1:9000;
            fastcgi_index             index.php;
            fastcgi_param             SCRIPT_FILENAME $document_root$fastcgi_script_name;
            include                   fastcgi_params;
            fastcgi_read_timeout      300;
            fastcgi_intercept_errors  off;

            # Eliminar los headers CORS que añade Laravel/HandleCors para evitar
            # duplicados — nginx es la única fuente de verdad para CORS.
            fastcgi_hide_header 'Access-Control-Allow-Origin';
            fastcgi_hide_header 'Access-Control-Allow-Credentials';

            # CORS en TODAS las respuestas PHP: 200, 4xx, 5xx.
            # 'always' garantiza que se añadan incluso en respuestas de error.
            add_header 'Access-Control-Allow-Origin'      $cors_origin always;
            add_header 'Access-Control-Allow-Credentials' 'true'       always;
            add_header 'Vary'                             'Origin'     always;
        }

        location ~ /\.ht {
            deny all;
        }

        location ~* \.(jpg|jpeg|png|gif|ico|css|js|woff2?)$ {
            expires 30d;
            add_header Cache-Control "public, no-transform";
        }
    }
}
